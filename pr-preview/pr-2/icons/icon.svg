<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Croft PWA">
  <!-- Maskable: full-bleed background, art kept inside the central safe zone. -->
  <rect width="512" height="512" fill="#2f3539" />
  <g fill="#a2a9ab" stroke="#1c1e20" stroke-width="4">
    <!-- A drystone wall: rough courses of stacked stone. -->
    <rect x="140" y="150" width="110" height="60" rx="10" />
    <rect x="262" y="150" width="110" height="60" rx="10" />
    <rect x="150" y="222" width="90" height="60" rx="10" />
    <rect x="252" y="222" width="120" height="60" rx="10" />
    <rect x="140" y="294" width="130" height="60" rx="10" />
    <rect x="282" y="294" width="90" height="60" rx="10" />
  </g>
  <!-- Ruddy capstone accent. -->
  <rect x="196" y="120" width="120" height="26" rx="10" fill="#ab5330" stroke="#1c1e20" stroke-width="4" />
</svg>
