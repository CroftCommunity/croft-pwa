name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      # The one gate, identical to `npm run test` locally:
      # lint · typecheck · unit · build · e2e.
      - run: npm test

  # Publish the built dist/ to the ROOT of the gh-pages branch, which GitHub
  # Pages serves. Why a branch and not the Actions/artifact source: per-PR
  # previews (.github/workflows/preview.yml) live in gh-pages:/pr-preview/pr-N/,
  # and a repo can have only one Pages source. The deploy publishes to the branch
  # root while PRESERVING pr-preview/, so a production deploy never wipes a live
  # preview. Set Pages source to "Deploy from a branch → gh-pages / root".
  # The push is plain git (scripts/pages-deploy.sh) — no third-party deploy action.
  deploy:
    needs: gate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the built site to the gh-pages branch
    # Serialize every writer of gh-pages (this job + the preview workflow) so
    # they never race on `git push`.
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: bash scripts/pages-deploy.sh root dist "deploy ${{ github.sha }} to Pages"
